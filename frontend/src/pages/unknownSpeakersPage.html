<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unknown Speakers</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="app-layout">
    <nav class="nav-sidebar" aria-label="Main navigation">
      <ul>
        <li><a href="/">Videos</a></li>
        <li><a href="/pages/unknownSpeakersPage.html">Unknown Speakers</a></li>
        <li><a href="/summarizationConfigPage.html">Config</a></li>
      </ul>
    </nav>
    <div class="page-content">
      <header class="page-header">
        <h1>Unknown Speakers</h1>
      </header>
      <main class="page-main">
    <section class="speakers-section">
      <h2>Files needing speaker identification</h2>
      <div id="fileList" class="file-list"></div>
      <div id="message" class="message" aria-live="polite"></div>
    </section>
    <section id="segmentSection" class="segment-section" style="display: none;">
      <div class="identify-view-layout">
        <div class="transcript-scroll">
          <h2>Transcript</h2>
          <div id="transcriptPanel" class="transcript-panel transcript-txt-style" aria-label="Transcript by speaker and time"></div>
        </div>
        <div class="playback-bar" aria-label="Playback controls">
          <audio id="fullMedia" controls></audio>
          <div class="playback-actions">
            <button type="button" id="completeBtn" disabled>Complete identification</button>
            <button type="button" id="backToListBtn">Back to list</button>
          </div>
        </div>
      </div>
      <div id="identifyPopup" class="identify-popup" role="dialog" aria-label="Identify speaker" style="display: none;">
        <div class="identify-popup-inner">
          <h3 id="identifyPopupTitle">Identify speaker</h3>
          <label for="identifyFilter">Filter or type new name (Enter to create if unique)</label>
          <input type="text" id="identifyFilter" placeholder="Type to filter or new name…" autocomplete="off">
          <div id="identifySpeakerList" class="identify-speaker-list" role="listbox"></div>
          <div class="identify-popup-actions">
            <button type="button" id="identifySkipBtn">Skip / Not identify</button>
            <button type="button" id="identifyCancelBtn">Cancel</button>
          </div>
        </div>
      </div>
    </section>
      </main>
    </div>
  </div>
  <script src="/services/apiClient.js"></script>
  <script src="/services/pipelineSpeakersApi.js"></script>
  <script src="/pages/unknownSpeakersPage.js"></script>
</body>
</html>
