<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Language" content="en">
  <meta name="google" content="notranslate">
  <title>Explore – Inbox Queue</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <header class="page-header">
    <h1>Explore channel</h1>
    <button type="button" id="backBtn">Back to channels</button>
  </header>
  <main class="page-main">
    <section class="media-section">
      <h2>Preview</h2>
      <div id="mediaSubpanel"></div>
    </section>
    <section class="files-section">
      <h2>Inbox files</h2>
      <div id="fileList" class="file-list-wrap"></div>
      <div class="file-actions">
        <button type="button" id="queueSelectedBtn" style="display:none">Queue selected</button>
      </div>
      <div id="filePagination" class="pagination"></div>
      <div id="message" class="message" aria-live="polite"></div>
    </section>
  </main>
  <script src="/services/apiClient.js"></script>
  <script src="/components/mediaSubpanel.js"></script>
  <script src="/components/fileList.js"></script>
  <script src="/pages/explorePage.js"></script>
</body>
</html>
